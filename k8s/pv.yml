# EKS uses dynamic provisioning via EBS CSI Driver.
# No manual PersistentVolumes needed — PVCs reference the StorageClass directly.
# This file defines the gp3 StorageClass for EKS.
# NOTE: Not set as default to avoid conflict with EKS built-in gp2 default.
# PVCs explicitly reference storageClassName: gp3
apiVersion: storage.k8s.io/v1
kind: StorageClass
metadata:
  name: gp3
provisioner: ebs.csi.aws.com
parameters:
  type: gp3
  fsType: ext4
reclaimPolicy: Delete
volumeBindingMode: WaitForFirstConsumer
allowVolumeExpansion: true
